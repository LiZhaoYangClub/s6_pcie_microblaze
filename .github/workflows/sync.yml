name: 🔄 Sync Fork with Upstream
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # 关键修复：给 Action 写入权限，解决 128 错误
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 关键修复：开启 token 认证
          persist-credentials: true

      - name: 配置 Git 用户
        run: |
          git config --global user.name "LiZhaoYangClub"
          git config --global user.email "948792324@qq.com"

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/Cr4sh/s6_pcie_microblaze.git

      - name: 拉取上游最新代码
        run: git fetch upstream

      - name: 合并上游更新到 master 分支
        run: |
          git checkout master
          git merge --no-edit upstream/master

      - name: 推送到自己的 Fork
        run: git push origin master
